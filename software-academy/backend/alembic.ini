[alembic]
# Папка с миграциями (относительно backend/)
script_location = alembic
# Чтобы был виден пакет app при запуске alembic из папки backend/
prepend_sys_path = .
# sqlalchemy.url НЕ пишем здесь — он подставляется в env.py из настроек приложения
# (так адрес БД один и тот же и для приложения, и для миграций).

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
