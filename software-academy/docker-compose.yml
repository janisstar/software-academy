# Запускает два контейнера вместе: базу данных и бэкенд.
# Команда:  docker compose up --build
# Swagger после запуска:  http://localhost:8000/docs

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: academy
      POSTGRES_PASSWORD: academy
      POSTGRES_DB: academy
    ports:
      - "5432:5432"               # проброс порта, чтобы видеть БД и с хоста
    volumes:
      - postgres-data:/var/lib/postgresql/data   # данные переживают перезапуск
    healthcheck:                  # бэкенд подождёт, пока БД действительно готова
      test: ["CMD-SHELL", "pg_isready -U academy -d academy"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    env_file:
      - ./backend/.env
    environment:
      # Внутри сети Docker база доступна по имени сервиса "db", а не localhost.
      # Эта строка переопределяет DATABASE_URL из .env именно для контейнера.
      DATABASE_URL: postgresql+psycopg://academy:academy@db:5432/academy
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"

volumes:
  postgres-data:
